name: CI

on:
  push:
    branches: [main]
  pull_request:

# Deterministic compose project name -> network is always ticket-booking_default.
env:
  COMPOSE_PROJECT_NAME: ticket-booking

jobs:
  go-test:
    name: Go integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Postgres auto-applies db/*.sql on first boot; --wait blocks on healthchecks.
      - name: Start Postgres + Redis
        run: docker compose up -d --wait postgres redis

      - name: go vet + go test
        run: |
          docker run --rm --network ticket-booking_default \
            -v "$PWD/api":/src -w /src \
            -e DATABASE_URL="postgres://ticket:ticket@postgres:5432/ticket?sslmode=disable" \
            -e REDIS_ADDR="redis:6379" \
            golang:1.22 sh -c "go vet ./... && go test ./..."

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build & start full stack
        run: docker compose up -d --build

      - name: Wait for API + web
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/readyz | grep -q ready \
               && [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000)" = "200" ]; then
              echo "stack ready after ${i} tries"; exit 0
            fi
            sleep 3
          done
          echo "stack did not become ready"; docker compose logs; exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps + Playwright
        working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E
        working-directory: web
        run: npx playwright test

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
